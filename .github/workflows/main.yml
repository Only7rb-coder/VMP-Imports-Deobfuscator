name: Build EXE
on: [workflow_dispatch]

# This line officially opts into Node.js 24 and clears the warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Solution
        # Using /p:OutDir ensures the files land in a predictable spot
        run: msbuild VMP-Imports-Deobfuscator.sln /p:Configuration=Release /p:Platform=x64 /p:OutDir=D:\a\VMP-Output\

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: VMP-Deobfuscator-Exe
          # We point directly to the forced OutDir from the build step
          path: D:\a\VMP-Output\*.exe
